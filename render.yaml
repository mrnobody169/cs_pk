services:
  - type: web
    name: poker-track-backend
    runtime: java
    buildCommand: "cd backend && mvn clean install -DskipTests"
    startCommand: "java -jar backend/target/smartnote-backend-1.0.0.jar"
    envVars:
      - key: JAVA_VERSION
        value: 11
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  - type: web
    name: poker-track-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: poker-track-backend
          property: host
